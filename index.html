<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>ГОЛОГРАМА | ОЛІМПІЙСЬКИЙ ДЕНЬ</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
            -webkit-user-select: none;
        }
        body {
            overflow: hidden;
            background: #000;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            height: 100vh;
            width: 100vw;
        }

        #video {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            z-index: 0;
        }
        #canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
        }

        /* ===== LOADING ===== */
        #loading {
            position: fixed;
            inset: 0;
            background: #fff;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            padding: 24px;
        }
        .ol-loader {
            display: flex;
            gap: 12px;
            margin-bottom: 30px;
        }
        .ol-circle {
            width: 24px;
            height: 24px;
            border-radius: 50%;
            animation: bounce 1.2s infinite ease-in-out;
        }
        .ol-circle:nth-child(1) {
            background: #0081C8;
            animation-delay: -0.4s;
        }
        .ol-circle:nth-child(2) {
            background: #FCB131;
            animation-delay: -0.3s;
        }
        .ol-circle:nth-child(3) {
            background: #000000;
            animation-delay: -0.2s;
        }
        .ol-circle:nth-child(4) {
            background: #00A651;
            animation-delay: -0.1s;
        }
        .ol-circle:nth-child(5) {
            background: #EE334E;
        }
        @keyframes bounce {
            0%,
            100% {
                transform: translateY(0);
            }
            50% {
                transform: translateY(-20px);
            }
        }

        .pbwrap {
            width: 100%;
            max-width: 280px;
            background: rgba(0, 0, 0, 0.06);
            border-radius: 6px;
            height: 6px;
            overflow: hidden;
        }
        .pb {
            height: 100%;
            background: #0081C8;
            width: 0%;
            transition: width .4s ease;
        }

        /* ===== ONBOARDING (підказки) ===== */
        #onboarding {
            position: absolute;
            bottom: max(20px, env(safe-area-inset-bottom, 20px));
            left: 20px;
            right: 20px;
            z-index: 200;
            display: flex;
            flex-direction: column;
            gap: 10px;
            pointer-events: none;
            align-items: center;
        }
        #step-card {
            background: rgba(255, 255, 255, 0.92);
            backdrop-filter: blur(10px);
            border-radius: 24px;
            padding: 16px 24px;
            display: flex;
            align-items: center;
            gap: 16px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.15);
            width: 100%;
            max-width: 480px;
            border-left: 6px solid #0081C8;
        }
        #step-ring-emoji {
            font-size: 36px;
        }
        #step-title {
            font-size: 18px;
            font-weight: 700;
            color: #111;
        }
        #step-sub {
            font-size: 14px;
            color: #555;
            margin-top: 2px;
        }

        /* ===== AUTOPLAY OVERLAY ===== */
        #autoplay-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.85);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 500;
            flex-direction: column;
            gap: 20px;
        }
        #autoplay-overlay.visible {
            display: flex;
        }
        #autoplay-lbl {
            color: #fff;
            font-size: 20px;
            font-weight: 700;
            text-align: center;
            padding: 0 24px;
        }
        #autoplay-btn {
            background: linear-gradient(135deg, #0081C8, #0066a0);
            color: #fff;
            border: none;
            padding: 18px 46px;
            font-size: 18px;
            font-weight: 700;
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 0 8px 24px rgba(0, 129, 200, 0.3);
        }

        /* ===== КНОПКА ПЕРЕЗАПУСКУ ВІДЕО (з'являється після завершення) ===== */
        #replay-btn {
            position: absolute;
            bottom: 120px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 300;
            background: linear-gradient(135deg, #00A651, #00803e);
            color: #fff;
            font-size: 20px;
            font-weight: 700;
            padding: 16px 40px;
            border-radius: 60px;
            border: none;
            cursor: pointer;
            box-shadow: 0 10px 30px rgba(0, 166, 81, 0.5);
            display: none;
            text-transform: uppercase;
            letter-spacing: 1px;
            transition: transform 0.2s;
        }
        #replay-btn:active {
            transform: translateX(-50%) scale(0.95);
        }

        /* ===== АДАПТИВ ===== */
        @media (max-width: 640px) {
            #step-card {
                padding: 12px 16px;
            }
            #step-ring-emoji {
                font-size: 28px;
            }
            #step-title {
                font-size: 16px;
            }
            #step-sub {
                font-size: 13px;
            }
            #replay-btn {
                font-size: 16px;
                padding: 14px 28px;
                bottom: 100px;
            }
        }
    </style>
</head>
<body>

    <!-- ===== ВІДЕО ТА CANVAS ===== -->
    <video id="video" autoplay playsinline muted></video>
    <canvas id="canvas"></canvas>

    <!-- ===== LOADING ===== -->
    <div id="loading">
        <div class="ol-loader">
            <div class="ol-circle"></div>
            <div class="ol-circle"></div>
            <div class="ol-circle"></div>
            <div class="ol-circle"></div>
            <div class="ol-circle"></div>
        </div>
        <div style="font-family:inherit; font-weight:700; color:#444; margin-bottom:16px;" id="load-status">Налаштування Олімпійського простору...</div>
        <div class="pbwrap"><div class="pb" id="pb"></div></div>
    </div>

    <!-- ===== AUTOPLAY OVERLAY ===== -->
    <div id="autoplay-overlay">
        <div id="autoplay-lbl">Олімпійська голограма готова!<br>Натисніть для запуску презентації</div>
        <button class="btn-next" id="autoplay-btn">▶ Запустити</button>
    </div>

    <!-- ===== ONBOARDING ===== -->
    <div id="onboarding">
        <div id="step-card">
            <div id="step-ring-emoji">🖐️</div>
            <div>
                <div id="step-title">Привітання з Олімпійським днем!</div>
                <div id="step-sub">Покажи долоню, щоб активувати 5 кілець. Зроби знак OK 👌 для запуску відео.</div>
            </div>
        </div>
    </div>

    <!-- ===== КНОПКА ПЕРЕЗАПУСКУ ВІДЕО ===== -->
    <button id="replay-btn">▶ Програти відео ще раз</button>

    <!-- ===== ІМПОРТ THREE.JS ТА MEDIAPIPE ===== -->
    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.158.0/build/three.module.js",
                "@mediapipe/tasks-vision": "https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.3/+esm"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { FilesetResolver, HandLandmarker } from '@mediapipe/tasks-vision';

        // ===== КОНФІГ =====
        const CFG = {
            hologramOffsetY: 0.35,
            hologramScale: 1.1,
            posSmoothing: 0.15,
            rotSmoothing: 0.15,
            videoSrc: 'assets/video/guide_hologram.mp4',
        };

        // ===== DOM =====
        const videoEl = document.getElementById('video');
        const canvasEl = document.getElementById('canvas');
        const loadingEl = document.getElementById('loading');
        const autoplayOverlay = document.getElementById('autoplay-overlay');
        const autoplayBtn = document.getElementById('autoplay-btn');
        const replayBtn = document.getElementById('replay-btn');
        const onboardingEl = document.getElementById('onboarding');

        // ===== THREE.JS СЦЕНА =====
        const scene = new THREE.Scene();
        const cam3 = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
        cam3.position.set(0, 0, 3.0);
        const renderer = new THREE.WebGLRenderer({ canvas: canvasEl, alpha: true, antialias: true });
        renderer.setClearColor(0, 0);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        renderer.setSize(window.innerWidth, window.innerHeight);

        window.addEventListener('resize', () => {
            cam3.aspect = window.innerWidth / window.innerHeight;
            cam3.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        // ===== 5 КІЛЕЦЬ =====
        const olympicGroup = new THREE.Group();
        scene.add(olympicGroup);

        const ringColors = [0x0081C8, 0xFCB131, 0x000000, 0x00A651, 0xEE334E];
        const ringPositions = [
            [-0.18, 0.06, 0],
            [-0.09, -0.02, 0],
            [0, 0.06, 0],
            [0.09, -0.02, 0],
            [0.18, 0.06, 0]
        ];

        ringColors.forEach((color, idx) => {
            const ringGeo = new THREE.TorusGeometry(0.07, 0.009, 16, 64);
            const ringMat = new THREE.MeshBasicMaterial({ color: color, side: THREE.DoubleSide });
            const ringMesh = new THREE.Mesh(ringGeo, ringMat);
            ringMesh.position.set(ringPositions[idx][0], ringPositions[idx][1], ringPositions[idx][2]);
            olympicGroup.add(ringMesh);
        });

        // ===== ГОЛОГРАМА (ВІДЕО З ХРОМАКЕЄМ) =====
        const hologramGroup = new THREE.Group();
        scene.add(hologramGroup);

        const hVideo = document.createElement('video');
        hVideo.setAttribute('playsinline', '');
        hVideo.setAttribute('crossorigin', 'anonymous');
        hVideo.muted = true;
        hVideo.loop = false;
        hVideo.src = CFG.videoSrc;

        const vTex = new THREE.VideoTexture(hVideo);
        const vShader =
            `varying vec2 vUv; void main(){ vUv=uv; gl_Position=projectionMatrix*modelViewMatrix*vec4(position,1.); }`;
        const fShader = `
          uniform sampler2D uTex;
          uniform float uTime;
          uniform float uPlaying;
          varying vec2 vUv;

          vec3 rgb2hsv(vec3 c){
            vec4 K=vec4(0.,-1./3.,2./3.,-1.);
            vec4 p=mix(vec4(c.bg,K.wz),vec4(c.gb,K.xy),step(c.b,c.g));
            vec4 q=mix(vec4(p.xyw,c.r),vec4(c.r,p.yzx),step(p.x,c.r));
            float d=q.x-min(q.w,q.y);
            float e=1e-10;
            return vec3(abs(q.z+(q.w-q.y)/(6.*d+e)),d/(q.x+e),q.x);
          }

          void main(){
            if(uPlaying<0.5){ discard; }
            vec4 col = texture2D(uTex, vUv);
            vec3 hsv = rgb2hsv(col.rgb);
            float hDeg = hsv.x * 360.0;
            bool isChroma = (hDeg > 75.0 && hDeg < 170.0) && hsv.y > 0.24 && hsv.z > 0.08;
            if(isChroma) discard;
            float edgeMask = 1.0;
            if(hDeg > 70.0 && hDeg < 175.0 && hsv.y > 0.14 && hsv.z > 0.06){
              edgeMask = 1.0 - smoothstep(0.14, 0.28, hsv.y);
              if(edgeMask < 0.05) discard;
            }
            gl_FragColor = vec4(col.rgb, col.a * edgeMask);
          }
        `;

        const hMat = new THREE.ShaderMaterial({
            uniforms: { uTex: { value: vTex }, uTime: { value: 0 }, uPlaying: { value: 0 } },
            vertexShader: vShader,
            fragmentShader: fShader,
            transparent: true,
            side: THREE.DoubleSide,
            depthWrite: false
        });
        const hPlane = new THREE.Mesh(new THREE.PlaneGeometry(CFG.hologramScale, CFG.hologramScale * 0.75), hMat);
        hPlane.position.y = CFG.hologramOffsetY;
        hologramGroup.add(hPlane);

        // ===== СТАН ВІДЕО =====
        let videoPlayed = false;
        let hologramActive = false;

        function resetVideoState() {
            videoPlayed = false;
            hologramActive = false;
            hVideo.pause();
            hVideo.currentTime = 0;
            hMat.uniforms.uPlaying.value = 0;
            autoplayOverlay.classList.remove('visible');
            hologramGroup.visible = false;
            replayBtn.style.display = 'none';
        }

        function showReplayButton() {
            replayBtn.style.display = 'block';
        }

        // Кнопка перезапуску – скидає відео і запускає знову (без жесту)
        replayBtn.addEventListener('click', () => {
            resetVideoState();
            // Запускаємо відео одразу
            hVideo.muted = false;
            hVideo.play().then(() => {
                videoPlayed = true;
                hologramActive = true;
                hologramGroup.visible = true;
                hMat.uniforms.uPlaying.value = 1;
                replayBtn.style.display = 'none';
            }).catch(() => {
                // Якщо не вдалося – показуємо оверлей
                autoplayOverlay.classList.add('visible');
            });
        });

        // Подія завершення відео
        hVideo.addEventListener('ended', () => {
            if (hologramActive) {
                hMat.uniforms.uPlaying.value = 0;
                showReplayButton();
            }
        });

        // Autoplay overlay – на випадок, якщо відео не запустилось автоматично
        autoplayBtn.addEventListener('click', () => {
            autoplayOverlay.classList.remove('visible');
            hVideo.muted = false;
            hVideo.play().then(() => {
                videoPlayed = true;
                hologramActive = true;
                hologramGroup.visible = true;
                hMat.uniforms.uPlaying.value = 1;
            }).catch(() => {
                hVideo.muted = true;
                hVideo.play().then(() => {
                    videoPlayed = true;
                    hologramActive = true;
                    hologramGroup.visible = true;
                    hMat.uniforms.uPlaying.value = 1;
                }).catch(() => {});
            });
        });

        function activateHologram() {
            if (hologramActive || videoPlayed) return;
            hologramActive = true;
            hologramGroup.visible = true;
            if ('vibrate' in navigator) navigator.vibrate(100);
            hVideo.muted = false;
            hVideo.play().then(() => {
                videoPlayed = true;
                hMat.uniforms.uPlaying.value = 1;
            }).catch(() => {
                autoplayOverlay.classList.add('visible');
            });
        }

        // ===== КАМЕРА (без кнопок – просто включаємо) =====
        let handLandmarker = null;
        let facingMode = 'user';

        async function startCamera() {
            if (videoEl.srcObject) videoEl.srcObject.getTracks().forEach(t => t.stop());
            const constraints = {
                video: {
                    facingMode: facingMode,
                    width: { ideal: 1280 },
                    height: { ideal: 720 }
                }
            };
            try {
                videoEl.srcObject = await navigator.mediaDevices.getUserMedia(constraints);
            } catch {
                videoEl.srcObject = await navigator.mediaDevices.getUserMedia({ video: true });
            }
            await videoEl.play();
            // Дзеркалимо для фронтальної камери
            videoEl.style.transform = facingMode === 'user' ? 'scaleX(-1)' : 'none';
        }

        // ===== ПЕТЛЯ ДЕТЕКЦІЇ ЖЕСТІВ =====
        let rotX = 0,
            rotZ = 0,
            okHoldTime = 0;

        function detectionLoop() {
            if (!handLandmarker || videoEl.readyState < 2) {
                requestAnimationFrame(detectionLoop);
                return;
            }
            const res = handLandmarker.detectForVideo(videoEl, performance.now());
            const isMirrored = facingMode === 'user';

            if (res.landmarks && res.landmarks.length > 0) {
                const lm = res.landmarks[0];

                // Позиція зап'ястя
                const wc = {
                    x: (lm[0].x + lm[17].x) / 2,
                    y: (lm[0].y + lm[17].y) / 2,
                    z: (lm[0].z + lm[17].z) / 2
                };
                const rawX = (wc.x - 0.5) * 2.6;
                const tx = isMirrored ? -rawX : rawX;
                const ty = (0.5 - wc.y) * 2.0;

                olympicGroup.position.x += (tx - olympicGroup.position.x) * CFG.posSmoothing;
                olympicGroup.position.y += (ty - olympicGroup.position.y) * CFG.posSmoothing;
                olympicGroup.position.z = wc.z * 0.6 + 0.08;

                hologramGroup.position.copy(olympicGroup.position);
                hologramGroup.position.y += CFG.hologramOffsetY;

                // Поворот
                const dx = (isMirrored ? -1 : 1) * (lm[5].x - lm[17].x),
                    dy = lm[5].y - lm[17].y;
                const targetZ = Math.atan2(dy, dx) + Math.PI / 2;
                rotZ += (targetZ - rotZ) * CFG.rotSmoothing;
                olympicGroup.rotation.set(0, 0, rotZ);
                olympicGroup.visible = true;

                // Детекція жесту OK
                const palmSize = Math.hypot(lm[0].x - lm[9].x, lm[0].y - lm[9].y) || 0.001;
                const okDist = Math.hypot(lm[4].x - lm[8].x, lm[4].y - lm[8].y);
                const isOk = (okDist < palmSize * 0.5) &&
                    ([12, 16, 20].filter(t => lm[t].y < lm[t - 2].y - 0.008).length >= 2);

                if (isOk && !hologramActive) {
                    okHoldTime += 16;
                    if (okHoldTime >= 300) {
                        activateHologram();
                        okHoldTime = 0;
                    }
                } else {
                    okHoldTime = 0;
                }
            } else {
                olympicGroup.visible = false;
            }
            requestAnimationFrame(detectionLoop);
        }

        // ===== АНІМАЦІЙНИЙ ЦИКЛ =====
        function animate() {
            requestAnimationFrame(animate);
            if (hologramGroup.visible) hMat.uniforms.uTime.value = performance.now() / 1000;
            renderer.render(scene, cam3);
        }

        // ===== ІНІЦІАЛІЗАЦІЯ =====
        async function mainInit() {
            const setPb = (v) => document.getElementById('pb').style.width = v + '%';
            try {
                setPb(20);
                const vision = await FilesetResolver.forVisionTasks(
                    'https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.3/wasm'
                );
                setPb(50);
                handLandmarker = await HandLandmarker.createFromOptions(vision, {
                    baseOptions: {
                        modelAssetPath: 'https://storage.googleapis.com/mediapipe-models/hand_landmarker/hand_landmarker/float16/1/hand_landmarker.task',
                        delegate: 'GPU'
                    },
                    runningMode: 'VIDEO',
                    numHands: 1
                });
                setPb(70);
                await startCamera();
                setPb(90);
                setPb(100);
                setTimeout(() => {
                    loadingEl.style.display = 'none';
                    animate();
                    detectionLoop();
                }, 400);
            } catch (e) {
                console.error(e);
                document.getElementById('load-status').innerHTML =
                    '<span style="color:#EE334E">❌ Не вдалося отримати доступ до камери або ресурсів.</span>';
            }
        }

        mainInit();
    </script>
</body>
</html>
